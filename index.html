<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS Team Workflow Tracker</title>
  <meta name="description" content="Real-time animated workflow dashboard for PS team task tracking and stage analysis.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header" id="header">
    <div class="header-glow"></div>
    <h1 class="header-title">
      <span class="header-icon">⚡</span>
      PS Team Workflow Tracker
    </h1>
    <p class="header-subtitle" id="headerSubtitle">Loading analysis...</p>
  </header>

  <!-- Current Position Hero -->
  <section class="hero" id="heroSection">
    <div class="hero-card glass-card">
      <div class="hero-badge">📍 CURRENT POSITION</div>
      <h2 class="hero-stage" id="heroStage">—</h2>
      <p class="hero-summary" id="heroSummary">—</p>
    </div>
  </section>

  <!-- Pipeline Visualization -->
  <section class="pipeline-section">
    <h2 class="section-title">Pipeline Progress</h2>
    <div class="pipeline-wrapper">
      <div class="pipeline" id="pipeline">
        <!-- Dynamically generated by app.js -->
      </div>
    </div>
  </section>

  <!-- Tooltip (hidden by default, shown on hover) -->
  <div class="tooltip" id="tooltip">
    <div class="tooltip-header" id="tooltipHeader"></div>
    <div class="tooltip-body" id="tooltipBody"></div>
  </div>

  <!-- Active Stages Detail Grid -->
  <section class="details-section" id="detailsSection">
    <h2 class="section-title">Active Stages</h2>
    <div class="details-grid" id="detailsGrid">
      <!-- Dynamically generated by app.js -->
    </div>
  </section>

  <!-- Blockers Section -->
  <section class="blockers-section" id="blockersSection">
    <h2 class="section-title">⚠️ Blockers</h2>
    <div class="blockers-list" id="blockersList">
      <!-- Dynamically generated by app.js -->
    </div>
  </section>

  <!-- Next Step Banner -->
  <section class="next-step-section" id="nextStepSection">
    <div class="next-step-card glass-card">
      <div class="next-step-label">➡️ NEXT STEP</div>
      <p class="next-step-text" id="nextStepText">—</p>
    </div>
  </section>

  <footer class="footer">
    <p>Powered by ClickUp API + OpenRouter AI</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
